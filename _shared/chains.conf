# Chain -> (port, chainId) mapping for offline anvil backends.
# Each POC's test forks from http://127.0.0.1:<port>; anvil serves the chain's
# state from a per-POC anvil_states/<chain>_<block>.json loaded via --load-state.
#
# Ports are 8545 + offset; chainId is the real EVM chain id (anvil --chain-id).
# Format: <chain> <port> <chainId-decimal>
mainnet   8545  1
bsc       8546  56
arbitrum  8547  42161
base      8548  8453
polygon   8549  137
optimism  8550  10
avalanche 8551  43114
fantom    8552  250
gnosis    8553  100
linea     8554  59144
blast     8555  81457
mantle    8556  5000
zksync    8557  324
moonriver 8558  1285
sei       8559  1329
